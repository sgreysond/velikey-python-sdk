name: Release (PyPI)

on:
  workflow_dispatch:
    inputs:
      publish:
        description: "Publish to PyPI (requires PYPI_TOKEN)"
        required: true
        default: "false"
        type: choice
        options: ["false", "true"]

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - run: python -m pip install --upgrade pip build
      - run: pip install -e .
      - run: pytest -q || true
      - run: python -m build
      - name: Publish (guarded)
        if: ${{ inputs.publish == 'true' }}
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          password: ${{ secrets.PYPI_TOKEN }}
      - name: Upload dist (dry-run)
        if: ${{ inputs.publish != 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: pypi-dist
          path: dist/**

